<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Journal Logs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>
    <div class="container">

        <header>

            <h1>Daily Journal Logs</h1>
            <p>Write, edit and save your notes.</p>

        </header>

        <main class="glass-card">

            <form id="noteForm">

                <div class="form-grid">

                    <div class="input-group">

                        <label>Date</label>

                        <input type="date" id="noteDate" required>

                    </div>

                    <div class="input-group">

                        <label>Your Note</label>

                        <textarea id="noteText" rows="3" required placeholder="Start Typing....."></textarea>

                    </div>

                </div>

                <button class="btn-submit">

                    Save Note

                </button>

            </form>

        </main>

        <section class="list-section">

            <div class="list-header">

                <h3>Previous Notes</h3>

                <div class="filter-container">

                    <label class="filter-label">Filter</label>

                    <input type="date" id="filterDate">

                    <button id="clearFilterBtn" class="btn-clear-filter">

                        Clear

                    </button>

                </div>

                <span class="badge" id="totalNotes">

                    0 Notes

                </span>

            </div>

            <div id="notesContainer" class="notes-grid"></div>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
